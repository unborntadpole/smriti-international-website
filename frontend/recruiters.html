<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hire Employees - Smriti International</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header id="navbar">
  <div class="nav-container">
    <div class="logo">Smriti International</div>
    <nav>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
      </ul>
    </nav>
  </div>
</header>

<section class="contact-page">
  <div class="contact-container">
    <h2>Hire Skilled Employees</h2>
    <p class="section-subtitle">
      Tell us your requirements and we will provide the best manpower solutions
    </p>

    <form id="recruiterForm" class="contact-form">
      <input type="text" placeholder="Company Name" required>
      <input type="text" placeholder="Contact Person" required>
      <input type="email" placeholder="Email" required>
      <input type="text" placeholder="Phone Number" required>
      <textarea placeholder="Describe your manpower requirements" rows="5"></textarea>
      <button type="submit">Submit Requirement</button>
    </form>
  </div>
</section>

</body>
<script src="js/script.js"></script>
</html>
